name: Expand standards packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand standards repository
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import shutil
          import tarfile

          expected_archive_sha256 = (
              "dafd65ccd22b599bde484275236fafa7fd536174a43d6351f6d7013cd420443d"
          )

          segments = [
              ("seed/archive.part01.b64", 15000),
              ("seed/archive.part02.b64", 15000),
              ("seed/archive.part03.b64", 15000),
              ("seed/archive.part04a.b64", 5000),
              ("seed/archive.part04b.b64", 5000),
              ("seed/archive.part04c.b64", 5000),
              ("seed/archive.part05.b64", 15000),
              ("seed/archive.part06.b64", 15000),
              ("seed/archive.part07.b64", 6044),
          ]

          encoded_segments = []

          for path_text, expected_length in segments:
              path = Path(path_text)
              if not path.is_file():
                  raise RuntimeError(f"Missing archive segment: {path}")

              content = path.read_text(encoding="ascii")
              if len(content) != expected_length:
                  raise RuntimeError(
                      f"Archive segment {path} has invalid length: "
                      f"expected {expected_length}, received {len(content)}."
                  )

              encoded_segments.append(content)

          encoded_archive = "".join(encoded_segments)
          archive_bytes = base64.b64decode(encoded_archive, validate=True)
          actual_sha256 = hashlib.sha256(archive_bytes).hexdigest()

          if actual_sha256 != expected_archive_sha256:
              raise RuntimeError(
                  "Archive checksum mismatch. "
                  f"Expected {expected_archive_sha256}, received {actual_sha256}."
              )

          archive_path = Path("seed/all-standards.tar.xz")
          archive_path.write_bytes(archive_bytes)

          with tarfile.open(archive_path, mode="r:xz") as archive:
              for member in archive.getmembers():
                  member_path = Path(member.name)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise RuntimeError(f"Unsafe archive member path: {member.name}")

              archive.extractall(path=".", filter="data")

          shutil.rmtree("seed")
          Path(".github/workflows/seed-repository.yml").unlink(missing_ok=True)

          temporary_files = [
              "ACCESS_TEST.md",
              "TREE_TEST.md",
              "TREE_INLINE_TEST.md",
              "TREE_CAPABILITY_TEST.md",
              "CONNECTOR_WRITE_VERIFIED.md",
              "FINAL_CONNECTOR_TEST.md",
              "PLEASE_IGNORE_TEMPORARY_TEST.md",
              "TEMPORARY_TEST_NOTICE.md",
              "TEMP_WRITE_CHECK.md",
              "TEMP_ACCESS_CONFIRMED.md",
              "TEMP_FINAL_WRITE_CHECK.md",
              "DIRECT_UPLOAD_STATUS.md",
          ]

          for temporary_file in temporary_files:
              Path(temporary_file).unlink(missing_ok=True)
          PY

      - name: Commit expanded standards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No repository changes were produced."
            exit 0
          fi

          git commit -m "Expand language standards packages"
          git push
