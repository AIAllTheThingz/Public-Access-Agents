name: Expand standards packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "seed/**"
      - ".github/workflows/seed-repository.yml"

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand standards repository
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import shutil
          import tarfile

          encoded_parts = sorted(Path("seed").glob("all.part*.b64"))

          if not encoded_parts:
              raise RuntimeError("No repository seed archive parts were found.")

          encoded_archive = "".join(
              part.read_text(encoding="ascii")
              for part in encoded_parts
          )
          archive_path = Path("seed") / "all-standards.tar.xz"
          archive_path.write_bytes(base64.b64decode(encoded_archive))

          with tarfile.open(archive_path, mode="r:xz") as archive:
              for member in archive.getmembers():
                  member_path = Path(member.name)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise RuntimeError(
                          f"Unsafe archive member path: {member.name}"
                      )
              archive.extractall(path=".")

          shutil.rmtree("seed")
          Path(".github/workflows/seed-repository.yml").unlink()

          temporary_files = [
              "ACCESS_TEST.md",
              "TREE_TEST.md",
              "TREE_INLINE_TEST.md",
              "TREE_CAPABILITY_TEST.md",
              "CONNECTOR_WRITE_VERIFIED.md",
              "FINAL_CONNECTOR_TEST.md",
              "PLEASE_IGNORE_TEMPORARY_TEST.md",
              "TEMPORARY_TEST_NOTICE.md",
              "TEMP_WRITE_CHECK.md",
              "TEMP_ACCESS_CONFIRMED.md",
              "TEMP_FINAL_WRITE_CHECK.md",
          ]

          for temporary_file in temporary_files:
              Path(temporary_file).unlink(missing_ok=True)
          PY

      - name: Commit expanded standards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No repository changes were produced."
            exit 0
          fi

          git commit -m "Expand language standards packages"
          git push
