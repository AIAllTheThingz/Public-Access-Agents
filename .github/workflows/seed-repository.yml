name: Expand standards packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand standards repository
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import shutil
          import tarfile

          expected_lengths = [15000, 15000, 15000, 15000, 15000, 15000, 6044]
          expected_archive_sha256 = (
              "dafd65ccd22b599bde484275236fafa7fd536174a43d6351f6d7013cd420443d"
          )

          segment_paths = [
              Path(f"seed/archive.part{index:02d}.b64")
              for index in range(1, 8)
          ]

          encoded_segments = []

          for segment_path, expected_length in zip(
              segment_paths,
              expected_lengths,
              strict=True,
          ):
              if not segment_path.is_file():
                  raise RuntimeError(f"Missing archive segment: {segment_path}")

              segment = segment_path.read_text(encoding="ascii")

              if len(segment) != expected_length:
                  raise RuntimeError(
                      f"Archive segment {segment_path} has an invalid length: "
                      f"expected {expected_length}, received {len(segment)}."
                  )

              encoded_segments.append(segment)

          encoded_archive = "".join(encoded_segments)
          archive_bytes = base64.b64decode(encoded_archive, validate=True)
          actual_archive_sha256 = hashlib.sha256(archive_bytes).hexdigest()

          if actual_archive_sha256 != expected_archive_sha256:
              raise RuntimeError(
                  "Archive checksum mismatch. "
                  f"Expected {expected_archive_sha256}, "
                  f"received {actual_archive_sha256}."
              )

          archive_path = Path("seed/all-standards.tar.xz")
          archive_path.write_bytes(archive_bytes)

          with tarfile.open(archive_path, mode="r:xz") as archive:
              for member in archive.getmembers():
                  member_path = Path(member.name)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise RuntimeError(
                          f"Unsafe archive member path: {member.name}"
                      )

              archive.extractall(path=".", filter="data")

          shutil.rmtree("seed")
          Path(".github/workflows/seed-repository.yml").unlink()

          temporary_files = [
              "ACCESS_TEST.md",
              "TREE_TEST.md",
              "TREE_INLINE_TEST.md",
              "TREE_CAPABILITY_TEST.md",
              "CONNECTOR_WRITE_VERIFIED.md",
              "FINAL_CONNECTOR_TEST.md",
              "PLEASE_IGNORE_TEMPORARY_TEST.md",
              "TEMPORARY_TEST_NOTICE.md",
              "TEMP_WRITE_CHECK.md",
              "TEMP_ACCESS_CONFIRMED.md",
              "TEMP_FINAL_WRITE_CHECK.md",
              "DIRECT_UPLOAD_STATUS.md",
          ]

          for temporary_file in temporary_files:
              Path(temporary_file).unlink(missing_ok=True)
          PY

      - name: Commit expanded standards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No repository changes were produced."
            exit 0
          fi

          git commit -m "Expand language standards packages"
          git push
