name: Expand standards catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify and expand catalog
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import shutil
          import tarfile

          parts = [
              ("bootstrap/catalog.part01.b64", 5000, "cea1f1674de78ca6d3c25766c25d5201d4828e1642854652f3ecabfcb0c410f4"),
              ("bootstrap/catalog.part02a.b64", 2500, "ad617b02c0a2ac96b8563643a63a80c6144f3b77eaaa7fe88863e26da7e6187f"),
              ("bootstrap/catalog.part02b1.b64", 500, "6e4f0319871349bc5bb9059a53ddf75df9dfac93db3764f3f2e8f40a454d0653"),
              ("bootstrap/catalog.part02b2.b64", 500, "8f3b2e08026419d036a9f0c86a7340c9707f0345e8ded7a1acc5a43cace14794"),
              ("bootstrap/catalog.part02b3.b64", 500, "4116991a6306a60352eaf97e61141f2c58a6618500860a84bdf7c003360e6457"),
              ("bootstrap/catalog.part02b4.b64", 500, "4abe7c48dec1753491159356cc0a2adcf898936c0f9df67a95aa5f52f743075c"),
              ("bootstrap/catalog.part02b5.b64", 500, "4ddf94a1c4fb06c34f1da4425ab2e91bced42a238aba9271d0ae329d355f554c"),
              ("bootstrap/catalog.part03.b64", 5000, "8fdaa124d14080037137dfe251f1c1029228047083f8714b04d45e18b6d6070e"),
              ("bootstrap/catalog.part04.b64", 5000, "a52b70d4af1a5270075d4c8e8c99bb7b56068262c808c5e628da7bbf059557de"),
              ("bootstrap/catalog.part05.b64", 5000, "764f8fd6e92405a07c865e0b3badfd3beeb34bef2dff3e9d4f5f23a280787039"),
              ("bootstrap/catalog.part06.b64", 2744, "e598cf8bbacc8e60ca7ddb44399db514ad02cfb82b92e7416cc78bcbaf70540f"),
          ]

          encoded_parts = []
          for path_text, expected_length, expected_sha256 in parts:
              path = Path(path_text)
              if not path.is_file():
                  raise RuntimeError(f"Missing catalog archive part: {path}")

              content = path.read_text(encoding="ascii")
              if len(content) != expected_length:
                  raise RuntimeError(
                      f"Invalid length for {path}: expected {expected_length}, "
                      f"received {len(content)}."
                  )

              actual_sha256 = hashlib.sha256(content.encode("ascii")).hexdigest()
              if actual_sha256 != expected_sha256:
                  raise RuntimeError(
                      f"Checksum mismatch for {path}: expected {expected_sha256}, "
                      f"received {actual_sha256}."
                  )

              encoded_parts.append(content)

          archive_bytes = base64.b64decode("".join(encoded_parts), validate=True)
          expected_archive_sha256 = "42e8b143aa5e9338af3358928ca48290f9350c346ebfe67ebc985238d83c8948"
          actual_archive_sha256 = hashlib.sha256(archive_bytes).hexdigest()
          if actual_archive_sha256 != expected_archive_sha256:
              raise RuntimeError(
                  "Catalog archive checksum mismatch: "
                  f"expected {expected_archive_sha256}, received {actual_archive_sha256}."
              )

          archive_path = Path("bootstrap/public-agents-catalog.tar.xz")
          archive_path.write_bytes(archive_bytes)

          required_members = {
              "CATALOG.md",
              "governance/ORGANIZATION_CONTRACT.md",
              "disciplines/application-security/AGENTS.md",
              "platforms/kubernetes/AGENTS.md",
              "profiles/WEB_API.md",
              "schemas/project-manifest.schema.json",
              "tools/validate-standards/validate_repository.py",
              ".github/workflows/validate-standards.yml",
          }

          with tarfile.open(archive_path, mode="r:xz") as archive:
              members = archive.getmembers()
              names = {member.name for member in members}

              if len(members) != 101:
                  raise RuntimeError(
                      f"Unexpected catalog member count: expected 101, received {len(members)}."
                  )

              missing_members = sorted(required_members - names)
              if missing_members:
                  raise RuntimeError(
                      "Catalog archive is missing required files: "
                      + ", ".join(missing_members)
                  )

              for member in members:
                  member_path = Path(member.name)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise RuntimeError(f"Unsafe archive member path: {member.name}")

              archive.extractall(path=".", filter="data")

          shutil.rmtree("bootstrap")
          Path(".github/workflows/expand-catalog.yml").unlink(missing_ok=True)
          PY

      - name: Validate generated catalog
        shell: bash
        run: |
          python tools/validate-standards/validate_repository.py
          python tools/check-links/check_links.py

      - name: Commit expanded catalog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No catalog changes were produced."
            exit 0
          fi

          git commit -m "Add public standards catalog"
          git push
