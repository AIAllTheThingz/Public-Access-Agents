name: Build governance system

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Build and validate governance system
        shell: bash
        run: |
          if [[ ! -f bootstrap/governance/governance-package.tar.xz ]]; then
            echo "Governance system is already generated; nothing to do."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import re
          import shutil
          import tarfile

          archive_path = Path("bootstrap/governance/governance-package.tar.xz")
          expected_sha = "a103a656973dfa2c4361192e538ae0e433769a66fc57e76b88a250efcfb75394"
          actual_sha = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          if actual_sha != expected_sha:
              raise RuntimeError(
                  f"Governance archive checksum mismatch: expected {expected_sha}, "
                  f"received {actual_sha}."
              )

          required = {
              "governance/AGENTS.md",
              "governance/README.md",
              "governance/MANIFEST.md",
              "governance/ORGANIZATION_CONTRACT.md",
              "governance/AGENT_WORKING_METHOD.md",
              "governance/RISK_CLASSIFICATION.md",
              "governance/COMPLETION_EVIDENCE.md",
              "governance/EXCEPTION_PROCESS.md",
              "governance/AI_GENERATED_CODE_POLICY.md",
              "governance/HUMAN_REVIEW_POLICY.md",
              "governance/PRODUCTION_READINESS.md",
              "governance/SECURE_DEVELOPMENT_POLICY.md",
              "governance/THREAT_MODELING_POLICY.md",
              "governance/VULNERABILITY_RESPONSE.md",
              "governance/POLICY_MAP.md",
              "governance/ADOPTION_GUIDE.md",
              "governance/OPERATING_MODEL.md",
              "governance/POLICY_LIFECYCLE.md",
              "governance/CONTROL_EVIDENCE_MODEL.md",
              "governance/GOVERNANCE_DECISION_MATRIX.md",
              "CATALOG.md",
              "MANIFEST.md",
              "ROADMAP.md",
          }

          with tarfile.open(archive_path, "r:xz") as archive:
              members = archive.getmembers()
              names = {member.name for member in members}
              if len(members) != 47:
                  raise RuntimeError(
                      f"Unexpected governance archive member count: expected 47, "
                      f"received {len(members)}."
                  )
              missing = sorted(required - names)
              if missing:
                  raise RuntimeError(
                      "Governance archive missing required files: " + ", ".join(missing)
                  )
              for member in members:
                  member_path = Path(member.name)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise RuntimeError(f"Unsafe archive member path: {member.name}")
              archive.extractall(path=".", filter="data")

          shutil.rmtree("bootstrap/governance")
          bootstrap = Path("bootstrap")
          if bootstrap.exists() and not any(bootstrap.iterdir()):
              bootstrap.rmdir()
          PY

          python tools/validate-standards/validate_repository.py
          python tools/check-links/check_links.py

          python - <<'PY'
          from pathlib import Path
          import json
          import re

          root = Path("governance")
          errors = []

          required = [
              "AGENTS.md", "README.md", "MANIFEST.md", "POLICY_MAP.md",
              "ADOPTION_GUIDE.md", "OPERATING_MODEL.md", "POLICY_LIFECYCLE.md",
              "CONTROL_EVIDENCE_MODEL.md", "GOVERNANCE_DECISION_MATRIX.md",
          ]
          for name in required:
              if not (root / name).is_file():
                  errors.append(f"Missing governance entry point: {name}")

          policy_files = [
              "ORGANIZATION_CONTRACT.md", "AGENT_WORKING_METHOD.md",
              "RISK_CLASSIFICATION.md", "COMPLETION_EVIDENCE.md",
              "EXCEPTION_PROCESS.md", "AI_GENERATED_CODE_POLICY.md",
              "HUMAN_REVIEW_POLICY.md", "PRODUCTION_READINESS.md",
              "SECURE_DEVELOPMENT_POLICY.md", "THREAT_MODELING_POLICY.md",
              "VULNERABILITY_RESPONSE.md",
          ]
          for name in policy_files:
              path = root / name
              if not path.is_file():
                  errors.append(f"Missing governance policy: {name}")
              elif len(path.read_text(encoding="utf-8").splitlines()) < 100:
                  errors.append(f"Governance policy appears incomplete: {name}")

          if len((root / "README.md").read_text(encoding="utf-8").splitlines()) < 200:
              errors.append("Governance README appears incomplete.")

          if len(list((root / "templates").glob("*.md"))) < 13:
              errors.append("Governance template set is incomplete.")
          if len(list((root / "examples").glob("*.md"))) < 8:
              errors.append("Governance example set is incomplete.")
          if len(list((root / "examples/evidence").glob("*.json"))) < 3:
              errors.append("Governance JSON evidence set is incomplete.")

          preserved = {
            "GOV-CONTRACT": [
              "GOV-CONTRACT-001",
              "GOV-CONTRACT-002",
              "GOV-CONTRACT-003",
              "GOV-CONTRACT-004",
              "GOV-CONTRACT-005"
            ],
            "GOV-WORK": [
              "GOV-WORK-001",
              "GOV-WORK-002",
              "GOV-WORK-003",
              "GOV-WORK-004",
              "GOV-WORK-005",
              "GOV-WORK-006"
            ],
            "GOV-RISK": [
              "GOV-RISK-001",
              "GOV-RISK-002",
              "GOV-RISK-003",
              "GOV-RISK-004"
            ],
            "GOV-EVIDENCE": [
              "GOV-EVIDENCE-001",
              "GOV-EVIDENCE-002",
              "GOV-EVIDENCE-003",
              "GOV-EVIDENCE-004",
              "GOV-EVIDENCE-005"
            ],
            "GOV-EXCEPTION": [
              "GOV-EXCEPTION-001",
              "GOV-EXCEPTION-002",
              "GOV-EXCEPTION-003",
              "GOV-EXCEPTION-004"
            ],
            "GOV-AI": [
              "GOV-AI-001",
              "GOV-AI-002",
              "GOV-AI-003",
              "GOV-AI-004",
              "GOV-AI-005"
            ],
            "GOV-REVIEW": [
              "GOV-REVIEW-001",
              "GOV-REVIEW-002",
              "GOV-REVIEW-003",
              "GOV-REVIEW-004"
            ],
            "GOV-PROD": [
              "GOV-PROD-001",
              "GOV-PROD-002",
              "GOV-PROD-003",
              "GOV-PROD-004"
            ],
            "GOV-SECDEV": [
              "GOV-SECDEV-001",
              "GOV-SECDEV-002",
              "GOV-SECDEV-003",
              "GOV-SECDEV-004",
              "GOV-SECDEV-005"
            ],
            "GOV-THREAT": [
              "GOV-THREAT-001",
              "GOV-THREAT-002",
              "GOV-THREAT-003",
              "GOV-THREAT-004"
            ],
            "GOV-VULN": [
              "GOV-VULN-001",
              "GOV-VULN-002",
              "GOV-VULN-003",
              "GOV-VULN-004"
            ]
          }
          id_pattern = re.compile(r"^id:\s*(\S+)\s*$", re.MULTILINE)
          by_id = {}
          for path in root.glob("*.md"):
              text = path.read_text(encoding="utf-8")
              match = id_pattern.search(text)
              if match:
                  by_id[match.group(1)] = (path, text)

          for doc_id, rules in preserved.items():
              if doc_id not in by_id:
                  errors.append(f"Missing preserved governance document ID: {doc_id}")
                  continue
              path, text = by_id[doc_id]
              for rule in rules:
                  if rule not in text:
                      errors.append(f"Missing preserved rule {rule} in {path}")

          placeholders = [
              re.compile(r"\{\{"),
              re.compile(r"\}\}"),
              re.compile(r"\{data"),
              re.compile(r"<TODO>", re.IGNORECASE),
          ]
          for path in root.rglob("*"):
              if path.is_file() and path.suffix in {".md", ".json"}:
                  text = path.read_text(encoding="utf-8")
                  for pattern in placeholders:
                      if pattern.search(text):
                          errors.append(
                              f"Unresolved placeholder in {path}: {pattern.pattern}"
                          )

          risk = json.loads((root / "examples/evidence/risk-classification.example.json").read_text())
          for field in ("level", "rationale", "factors"):
              if field not in risk:
                  errors.append(f"Risk example missing {field}")

          exception = json.loads((root / "examples/evidence/exception-record.example.json").read_text())
          for field in (
              "id", "ruleId", "owner", "reason", "risk",
              "compensatingControls", "expiresOn", "status",
          ):
              if field not in exception:
                  errors.append(f"Exception example missing {field}")

          completion = json.loads((root / "examples/evidence/completion-result.example.json").read_text())
          for field in ("status", "summary", "filesChanged", "validation", "limitations"):
              if field not in completion:
                  errors.append(f"Completion example missing {field}")

          if errors:
              print("Governance-specific validation failed:")
              for error in errors:
                  print(f"- {error}")
              raise SystemExit(1)

          print("Governance-specific validation passed.")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No governance changes were produced."
            exit 0
          fi

          git commit -m "Complete governance operating system"
          git push
