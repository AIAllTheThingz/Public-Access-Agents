name: Build governance system

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Build governance system
        shell: bash
        run: |
          if [[ -f bootstrap/governance/build.py ]]; then
            python bootstrap/governance/build.py
          else
            echo "Governance system is already generated; nothing to do."
          fi
