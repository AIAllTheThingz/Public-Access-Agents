name: Build complete examples

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-examples.yml"
      - "bootstrap/examples/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Verify and expand examples
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import shutil
          import tarfile

          parts = [
              ("bootstrap/examples/part01.b64", 4500, "df2ea5e5f5b488e55ac0b0da82f05be6eb6de4fe24a96012baa3842bbefb9a0d"),
              ("bootstrap/examples/part02.b64", 4500, "3b213851780e35e8e028481f8af22913a6b460a6554b679fe03bcaaecdb92df1"),
              ("bootstrap/examples/part03.b64", 4500, "3b219de03f5e76bc25ff1a96c2bade29448aa0db06aeca31108d55e5ecc8a76f"),
              ("bootstrap/examples/part04.b64", 4500, "0496b9600810aa63f0fa5a74b8bf429a0101b1a8ce6589f052d58ee85334b7de"),
              ("bootstrap/examples/part05.b64", 4500, "05b5d9cf2c272265b1cbd7b5e60d615298706bf98250f8770ea0cceacb4fd56d"),
              ("bootstrap/examples/part06a.b64", 1500, "ea54a2ca7d1921446b3d99c157180d01dc16d0385d77934020f5cbcef80608e3"),
              ("bootstrap/examples/part06b.b64", 1500, "cfee078cee8b4fbf036d9f7380b8340f73152443c2da1cb563619c9a42ab7baa"),
              ("bootstrap/examples/part06c.b64", 1500, "7a0f95e52227552120df2ddeed2748d7fc07830129f33f852e131e3991d22be6"),
              ("bootstrap/examples/part07a.b64", 1500, "e39029ae8a750200361dad7ebdd0b9d8f17fc1c036eebb20fb5d8a4ab935914a"),
              ("bootstrap/examples/part07b.b64", 1500, "684e86b9e353566163f499f9489be07611e221d7e3c87aa77e7ae74e1b01848e"),
              ("bootstrap/examples/part07c.b64", 80, "3a1040a5d79a91d943673e61146f40d087b41adf03ad8c230d53e4228e6cd5ad"),
          ]

          encoded = []
          for path_text, expected_length, expected_sha256 in parts:
              path = Path(path_text)
              content = path.read_text(encoding="ascii")
              if len(content) != expected_length:
                  raise RuntimeError(
                      f"Invalid length for {path}: expected {expected_length}, "
                      f"received {len(content)}."
                  )
              actual_sha256 = hashlib.sha256(content.encode("ascii")).hexdigest()
              if actual_sha256 != expected_sha256:
                  raise RuntimeError(
                      f"Checksum mismatch for {path}: expected {expected_sha256}, "
                      f"received {actual_sha256}."
                  )
              encoded.append(content)

          archive_bytes = base64.b64decode("".join(encoded), validate=True)
          expected_archive_sha256 = "0fe5691181de312ef9e05f6dbc6006ea588614154b4c5acf311b9b1b4e80905e"
          actual_archive_sha256 = hashlib.sha256(archive_bytes).hexdigest()
          if actual_archive_sha256 != expected_archive_sha256:
              raise RuntimeError(
                  f"Archive checksum mismatch: expected {expected_archive_sha256}, "
                  f"received {actual_archive_sha256}."
              )

          archive_path = Path("bootstrap/examples-package.tar.xz")
          archive_path.write_bytes(archive_bytes)

          required_members = {
              "examples/README.md",
              "examples/AGENTS.md",
              "examples/MANIFEST.md",
              "examples/minimal/AGENTS.md",
              "examples/web-api/AGENTS.md",
              "examples/worker-service/AGENTS.md",
              "examples/full-stack/AGENTS.md",
              "examples/full-stack/docs/ACCESSIBILITY_PLAN.md",
              "examples/web-api/evidence/completion-result.example.json",
              "CATALOG.md",
              "MANIFEST.md",
              "ROADMAP.md",
          }

          with tarfile.open(archive_path, mode="r:xz") as archive:
              members = archive.getmembers()
              names = {member.name for member in members}

              if len(members) != 89:
                  raise RuntimeError(
                      f"Unexpected member count: expected 89, received {len(members)}."
                  )

              missing = sorted(required_members - names)
              if missing:
                  raise RuntimeError("Archive missing required files: " + ", ".join(missing))

              for member in members:
                  member_path = Path(member.name)
                  if member_path.is_absolute() or ".." in member_path.parts:
                      raise RuntimeError(f"Unsafe archive member path: {member.name}")

              archive.extractall(path=".", filter="data")

          shutil.rmtree("bootstrap")
          PY

      - name: Validate examples
        shell: bash
        run: |
          python tools/validate-standards/validate_repository.py
          python tools/check-links/check_links.py
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          roots = [
              Path("examples/minimal"),
              Path("examples/web-api"),
              Path("examples/worker-service"),
              Path("examples/full-stack"),
          ]

          common = {
              "AGENTS.md",
              "README.md",
              "MANIFEST.md",
              "project-manifest.json",
              "composition/STANDARDS_SELECTION.md",
              "composition/TAILORING_DECISIONS.md",
              "docs/AGENTS.md",
              "docs/ARCHITECTURE.md",
              "docs/RISK_ASSESSMENT.md",
              "docs/TEST_STRATEGY.md",
              "docs/OPERATIONS.md",
              "docs/COMPLETION_EVIDENCE.md",
              "tests/AGENTS.md",
              "evidence/completion-result.example.json",
              "evidence/test-evidence.example.json",
              "evidence/artifact-record.example.json",
          }

          ids = {}
          errors = []

          for root in roots:
              for relative in sorted(common):
                  if not (root / relative).is_file():
                      errors.append(f"{root}: missing {relative}")

              manifest = json.loads((root / "project-manifest.json").read_text())
              required_manifest = {"name", "profile", "languages", "disciplines"}
              allowed_manifest = required_manifest | {
                  "platforms", "frameworks", "risk", "exceptions"
              }
              missing_manifest = required_manifest - set(manifest)
              extra_manifest = set(manifest) - allowed_manifest
              if missing_manifest:
                  errors.append(f"{root}: manifest missing {sorted(missing_manifest)}")
              if extra_manifest:
                  errors.append(f"{root}: manifest has unsupported {sorted(extra_manifest)}")
              if not manifest.get("languages"):
                  errors.append(f"{root}: languages must not be empty")

              completion = json.loads(
                  (root / "evidence/completion-result.example.json").read_text()
              )
              for key in ["status", "summary", "filesChanged", "validation", "limitations"]:
                  if key not in completion:
                      errors.append(f"{root}: completion evidence missing {key}")

              test = json.loads((root / "evidence/test-evidence.example.json").read_text())
              for key in ["testType", "command", "result"]:
                  if key not in test:
                      errors.append(f"{root}: test evidence missing {key}")

              artifact = json.loads(
                  (root / "evidence/artifact-record.example.json").read_text()
              )
              for key in ["name", "type", "digest", "sourceCommit"]:
                  if key not in artifact:
                      errors.append(f"{root}: artifact evidence missing {key}")

          id_pattern = re.compile(r"^id:\s*(\S+)\s*$", re.MULTILINE)
          for path in sorted(Path("examples").rglob("*.md")):
              text = path.read_text(encoding="utf-8")
              match = id_pattern.search(text)
              if not match:
                  errors.append(f"{path}: missing front-matter id")
                  continue
              value = match.group(1)
              if value in ids:
                  errors.append(f"Duplicate id {value}: {ids[value]} and {path}")
              ids[value] = path

              for placeholder in ["{d[", "CHANGEME", "{{", "}}"]:
                  if placeholder in text:
                      errors.append(f"{path}: unresolved placeholder {placeholder}")

          if len(ids) != 70:
              errors.append(f"Expected 70 example Markdown ids, received {len(ids)}")

          if errors:
              print("Example validation failed:")
              for error in errors:
                  print(f"- {error}")
              raise SystemExit(1)

          print("Example validation passed: 4 compositions, 70 Markdown ids.")
          PY

      - name: Commit completed examples
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No example changes were produced."
            exit 0
          fi

          git commit -m "Complete standards composition examples"
          git push
