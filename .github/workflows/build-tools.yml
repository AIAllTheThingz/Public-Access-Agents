name: Build repository toolchain

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          show-progress: false

      - name: Generate repository toolchain
        shell: bash
        run: |
          if [[ -f bootstrap/tools/build.py ]]; then
            python bootstrap/tools/build.py
          else
            echo "Repository toolchain is already generated; nothing to do."
          fi

      - name: Install validation dependencies
        shell: bash
        run: python -m pip install --disable-pip-version-check --quiet -r tools/validate-schemas/requirements.txt

      - name: Run complete validation pipeline
        shell: bash
        run: python tools/validate-all/run_all.py --include-tests

      - name: Commit completed toolchain
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No toolchain changes were produced."
            exit 0
          fi

          git commit -m "Complete repository toolchain"
          git push
