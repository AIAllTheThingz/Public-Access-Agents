name: Build template library

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          show-progress: false

      - name: Generate template library
        shell: bash
        run: python bootstrap/templates/run.py

      - name: Install schema validator
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check --quiet \
            -r tools/validate-schemas/requirements.txt

      - name: Validate repository and template library
        shell: bash
        run: |
          python tools/validate-standards/validate_repository.py
          python tools/check-links/check_links.py
          python tools/validate-schemas/validate_schemas.py
          python tools/validate-templates/validate_templates.py

      - name: Commit completed template library
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No template changes were produced."
            exit 0
          fi

          git commit -m "Complete reusable template library"
          git push
