name: Build project profile packages

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          show-progress: false

      - name: Finalize project profile packages
        shell: bash
        run: |
          if [[ -f profile_package_cleanup.py ]]; then
            python profile_package_cleanup.py
          elif [[ -f bootstrap/profiles/run_fixed.py ]]; then
            python bootstrap/profiles/run_fixed.py
          else
            echo "Profile packages are already generated and finalized."
          fi
