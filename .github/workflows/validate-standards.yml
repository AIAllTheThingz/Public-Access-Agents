name: Validate standards

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install schema validator
        shell: bash
        run: |
          if [[ -f tools/validate-schemas/requirements.txt ]]; then
            python -m pip install --disable-pip-version-check --quiet \
              -r tools/validate-schemas/requirements.txt
          else
            echo "Schema validation requirements are not present yet."
          fi

      - name: Validate repository when catalog is present
        shell: bash
        run: |
          if [[ ! -f tools/validate-standards/validate_repository.py ]] || \
             [[ ! -f tools/check-links/check_links.py ]]; then
            echo "Catalog validation tools are not present yet; skipping validation until expansion completes."
            exit 0
          fi

          python tools/validate-standards/validate_repository.py
          python tools/check-links/check_links.py

          if [[ -f tools/validate-schemas/validate_schemas.py ]]; then
            python tools/validate-schemas/validate_schemas.py
          fi
